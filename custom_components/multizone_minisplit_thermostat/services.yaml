set_zone_preset:
  name: Set Zone Preset
  description: Set the preset for a specific zone.
  fields:
    zone:
      name: Zone
      description: The climate entity ID of the zone to set the preset for.
      required: true
      example: "climate.living_room_minisplit"
      selector:
        entity:
          domain: climate
    preset:
      name: Preset
      description: The preset to apply (comfort, eco, or failsafe).
      required: true
      example: "comfort"
      selector:
        select:
          options:
            - comfort
            - eco
            - failsafe

recalculate_offsets:
  name: Recalculate Offsets
  description: Force recalculation of learned temperature offsets for all zones or a specific zone.
  fields:
    zone:
      name: Zone
      description: The climate entity ID of a specific zone to recalculate. Leave empty for all zones.
      required: false
      example: "climate.living_room_minisplit"
      selector:
        entity:
          domain: climate

clear_offset_history:
  name: Clear Offset History
  description: Clear learned offset data for all zones or a specific zone.
  fields:
    zone:
      name: Zone
      description: The climate entity ID of a specific zone to clear. Leave empty for all zones.
      required: false
      example: "climate.living_room_minisplit"
      selector:
        entity:
          domain: climate
